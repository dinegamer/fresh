services:
  - type: web
    name: odoo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: odoo --config=/etc/odoo/odoo.conf
    envVars:
      - key: PORT
        value: 8069
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
